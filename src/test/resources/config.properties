# Configuración del framework de automatización E2E
# Las propiedades de sistema (-D) tienen prioridad sobre este archivo.

# URL base del frontend (Vite dev server por defecto)
base.url=http://localhost:5173

# Ejecutar en modo headless (true/false)
headless=false

# Tiempo máximo de espera explícita en segundos
explicit.wait=10

# Navegador (firefox | chrome)
browser=firefox
