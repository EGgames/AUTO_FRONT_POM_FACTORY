# ── Configuración general del proyecto ──────────────────────────────────────
serenity.project.name=Auto Front POM Factory

# ── WebDriver ─────────────────────────────────────────────────────────────────
webdriver.driver=firefox
webdriver.base.url=http://localhost:5173

# ── Pantallazos: BEFORE_AND_AFTER_EACH_STEP | AFTER_EACH_STEP | FOR_FAILURES──
serenity.take.screenshots=FOR_FAILURES

# ── Directorio de salida del reporte ─────────────────────────────────────────
serenity.outputDirectory=target/site/serenity

# ── Opciones de presentación en el reporte ───────────────────────────────────
serenity.report.show.manual.tests=false
serenity.display.full.report.link=true
serenity.report.issue.link.template=
